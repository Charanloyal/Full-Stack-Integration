services:
  - type: web
    name: full-stack-workspace
    env: node
    buildCommand: npm install && npm install --prefix backend && npm install --prefix frontend && npm run build --prefix frontend && npm run db:generate --prefix backend
    startCommand: npm run db:push --prefix backend && node backend/src/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        generateValue: true
